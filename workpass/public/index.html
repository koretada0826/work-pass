<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WORK PASS 登録</title>
<link rel="stylesheet" href="/ui.css">
</head>
<body>
<div class="obhead"><div class="logo">WORK <b>PASS</b></div><div class="tag">人ではなく、相性で採用する。</div></div>
<div class="obwrap" style="max-width:620px">
  <div class="card" style="text-align:center;padding:40px 30px">
    <div style="width:66px;height:66px;border-radius:18px;background:var(--brand-l);display:grid;place-items:center;margin:0 auto 14px">
      <svg viewBox="0 0 24 24" width="30" fill="none" stroke="#2f6bed" stroke-width="1.8"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></div>
    <h1 style="font-size:26px;margin:0">WORK PASS へようこそ</h1>
    <p class="lead" style="margin:12px auto 0;max-width:460px">あなたに合った仕事と出会うための登録です。プロフィールと簡単な診断・テストにお答えいただくと、あなたの強みや適性をもとに最適な仕事をご提案します。</p>
    <div id="steps" style="text-align:left;max-width:380px;margin:26px auto 6px;display:flex;flex-direction:column;gap:12px"></div>
    <button class="btn btn-primary lg" style="margin-top:26px;min-width:220px" onclick="location.href='/register.html'">登録をはじめる</button>
    <p class="note" style="margin-top:20px">ご入力いただいた情報は、当社および、ご希望された場合のみグループ会社・提携企業のご紹介に利用します。</p>
  </div>
  <p style="text-align:center;margin-top:16px"><a href="/admin-login.html" class="note">採用担当の方はこちら（運営ログイン）</a></p>
</div>
<script>
const steps=[['1','プロフィールの入力（約5分）'],['2','6つの適性診断・テスト（約20分）'],['3','希望条件の入力・確認']];
document.getElementById('steps').innerHTML = steps.map(([n,t])=>
  `<div style="display:flex;align-items:center;gap:13px"><span style="width:30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px;flex:none">${n}</span><span>${t}</span></div>`).join('');
</script>
</body>
</html>
