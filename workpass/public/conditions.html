<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>希望条件の入力 - WORK PASS</title>
<link rel="stylesheet" href="/ui.css">
</head>
<body>
<div id="wiz"></div>
<div class="obwrap">
  <div style="text-align:center"><h1 style="font-size:28px;margin:8px 0">希望する働き方を教えてください</h1>
    <p class="lead">この条件をもとに、相性の良い求人をマッチングします。</p></div>
  <form id="form">
    <div class="card" style="margin-bottom:16px">
      <div class="card-h"><span class="ct">勤務条件</span></div>
      <div class="grid2">
        <div class="field"><label class="fl">希望勤務地 <span class="req">必須</span></label><select name="pref_location" id="pref_location" required></select></div>
        <div class="field"><label class="fl">希望雇用形態 <span class="req">必須</span></label>
          <select name="pref_employment" required><option value="">選択してください</option>
            <option>正社員</option><option>契約社員</option><option>派遣</option><option>アルバイト</option><option>業務委託</option></select></div>
      </div>
      <div class="field"><label class="fl">勤務可能曜日</label><div class="days" id="days"></div></div>
      <div class="grid3">
        <div class="field"><label class="fl">勤務可能時間</label>
          <div style="display:flex;align-items:center;gap:8px">
            <select id="t_start" style="flex:1"></select><span style="color:var(--mut)">〜</span><select id="t_end" style="flex:1"></select>
          </div></div>
        <div class="field"><label class="fl">転職希望時期 <span class="req">必須</span></label>
          <select name="change_timing" required><option value="">選択</option><option>すぐにでも</option><option>3ヶ月以内</option><option>半年以内</option><option>1年以内</option><option>未定</option></select></div>
        <div class="field"><label class="fl">希望年収（万円） <span class="req">必須</span></label><input name="pref_annual_income" type="number" min="0" max="100000" placeholder="例）400" required></div>
      </div>
      <div class="field" style="max-width:calc(33% - 12px)"><label class="fl">希望月収（万円）</label><input name="pref_monthly_income" type="number" min="0" placeholder="例）30"></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:space-between">
      <a class="btn btn-ghost" id="back">← 戻る</a>
      <button type="submit" class="btn btn-primary">入力内容を確認する →</button>
    </div>
  </form>
</div>
<div class="toast" id="toast"></div>
<script src="/layout.js"></script>
<script>
document.getElementById('wiz').innerHTML = wizHeader(3);
const id=new URLSearchParams(location.search).get('id');
if(!/^\d+$/.test(String(id))){ location.replace('/register.html'); throw 0; }
document.getElementById('back').href='/tests.html?id='+id;
document.getElementById('days').innerHTML=['月','火','水','木','金','土','日'].map(d=>`<label><input type="checkbox" value="${d}">${d}</label>`).join('');
// 希望勤務地：在宅＋都道府県
(function(){
  const remote=['在宅（フルリモート）','在宅・出社どちらも可（ハイブリッド）'];
  const pref=['北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県','茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県','新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県','静岡県','愛知県','三重県','滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県','鳥取県','島根県','岡山県','広島県','山口県','徳島県','香川県','愛媛県','高知県','福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県'];
  const g=(label,arr)=>`<optgroup label="${label}">${arr.map(v=>`<option value="${v}">${v}</option>`).join('')}</optgroup>`;
  document.getElementById('pref_location').innerHTML='<option value="" selected>選択してください</option>'+g('リモート',remote)+g('都道府県',pref);
})();
// 勤務可能時間：30分刻みの開始〜終了セレクト
(function(){
  let opts='<option value="" selected>選択</option>';
  for(let m=0;m<=24*60;m+=30){ const hh=String(Math.floor(m/60)).padStart(2,'0'), mm=String(m%60).padStart(2,'0'); opts+=`<option value="${hh}:${mm}">${hh}:${mm}</option>`; }
  document.getElementById('t_start').innerHTML=opts;
  document.getElementById('t_end').innerHTML=opts;
  document.getElementById('t_start').value='09:00';
  document.getElementById('t_end').value='18:00';
})();
document.getElementById('form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const checkedDays=[...document.querySelectorAll('#days input:checked')];
  if(checkedDays.length===0){ const t=document.getElementById('toast'); t.textContent='勤務可能曜日を1つ以上選択してください'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); return; }
  const fd=new FormData(e.target); const data={};
  for(const [k,v] of fd.entries()) data[k]= v===''? null : v;
  ['pref_annual_income','pref_monthly_income'].forEach(k=>{ if(data[k]!=null) data[k]=Number(data[k]); });
  const st=document.getElementById('t_start').value, en=document.getElementById('t_end').value;
  data.pref_time = (st&&en) ? `${st}〜${en}` : null;
  data.pref_days = JSON.stringify([...document.querySelectorAll('#days input:checked')].map(c=>c.value));
  await fetch('/api/candidates/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  location.href='/confirm.html?id='+id;
});
</script>
</body>
</html>
