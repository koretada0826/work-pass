<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ホーム - WORK PASS</title>
<link rel="stylesheet" href="/ui.css">
</head>
<body>
<div id="app"></div>
<script src="/layout.js"></script>
<script>
const params = new URLSearchParams(location.search);
const id = params.get('t');
if(!/^[A-Za-z0-9_-]{16,64}$/.test(String(id))){ location.replace('/register.html'); throw 0; }

function build(cand){
  const name = cand?.name || 'ゲスト';
  const firstName = (name.split(/[ 　]/)[0]) || name;

  // プロフィール充足率（実データから算出。無ければ0）
  let fill = 0;
  if (cand) {
    const keys = ['name','age','nearest_station','contact','pref_location','pref_employment','pref_time',
      'career_job','career_industry','goal_3y','future_work','qualifications','val_growth'];
    const f = keys.filter(k => cand[k]!=null && cand[k]!=='').length;
    fill = Math.round(f/keys.length*100);
  }

  // 適性サマリー（実データ＝各診断のスコア。未受験は0＋案内）
  const t = cand?.tests || {};
  const hasTests = Object.keys(t).length>0;
  const aptData = [['一般常識',t.general?.score],['営業適性',t.sales?.score],['コミュニケーション',t.communication?.score],['性格傾向',t.personality?.score],['ビジネスマナー',t.manners?.score]].map(([l,v])=>[l, v??0]);
  const apt = hasTests;

  const welcome = `
  <div class="grid welcome-grid" style="grid-template-columns:1.7fr 1fr 1fr">
    <div class="card">
      <div style="display:flex;align-items:center;gap:14px">
        <span class="av" style="width:56px;height:56px;border-radius:50%;background:#e8f0ff;display:inline-block"></span>
        <div><div style="font-size:19px;font-weight:800">こんにちは、${escS(firstName)}さん</div>
          <div class="note">あなたに合う求人をAIが毎日更新しています。</div></div>
      </div>
      <div class="barrow" style="grid-template-columns:96px 1fr 42px;margin-top:16px">
        <div class="bl">プロフィール充足率</div><div class="track"><i style="width:${fill}%"></i></div><div class="bv">${fill}%</div>
      </div>
      <button class="btn btn-primary block" style="margin-top:14px" onclick="location.href='/tests.html?t=${id}'">診断・テストを続ける／見直す　›</button>
    </div>
    <div class="card"><div class="stat" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div class="ico" style="width:40px;height:40px"><svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/></svg></div>
      <div class="lab">おすすめ求人</div><div class="num" id="kpi-jobs">–<small>件</small></div><div class="delta" id="kpi-jobs-d">読み込み中…</div></div></div>
    <div class="card"><div class="stat" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div class="ico star" style="width:40px;height:40px"><svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l2.7 6.3L21 10l-5 4.3L17.5 21 12 17.5 6.5 21 8 14.3 3 10l6.3-.7z"/></svg></div>
      <div class="lab">おすすめの求人<span class="note" style="font-weight:400">（相性60%以上）</span></div><div class="num" id="kpi-high">–<small>件</small></div><div class="delta" id="kpi-high-d">読み込み中…</div></div></div>
  </div>`;

  const jobCards = `
  <div class="card" id="jobrecs">
    <div class="card-h"><span class="hi">👍</span><span class="ct">あなたにおすすめの求人</span></div>
    <p class="muted" id="jobrecsmsg">求人との相性を読み込んでいます…</p>
  </div>`;

  const aptCard = `
  <div class="card">
    <div class="card-h"><span class="hi">📊</span><span class="ct">あなたの適性サマリー</span>${apt?'':'<span class="demoflag">診断がまだです</span>'}</div>
    <div class="bars">
      ${aptData.map(([l,v])=>`<div class="barrow" style="grid-template-columns:120px 1fr 34px"><div class="bl">${l}</div><div class="track"><i style="width:${v}%"></i></div><div class="bv">${v}</div></div>`).join('')}
    </div>
    ${apt?'':'<p class="note" style="margin-top:8px">診断・テストを受けると、ここにあなたのスコアが表示されます。</p>'}
    <button class="btn btn-outline block" style="margin-top:16px" onclick="document.getElementById('aiseeker')?.scrollIntoView({behavior:'smooth',block:'start'})">AIキャリア診断を見る　›</button>
  </div>`;

  const statusCard = `
  <div class="card">
    <div class="card-h"><span class="hi">📋</span><span class="ct">選考状況</span></div>
    <div style="text-align:center;padding:24px 10px" class="muted"><div style="font-size:13px">進行中の選考はありません</div><div class="note" style="margin-top:4px">求人へ応募すると、ここに進捗が表示されます</div></div>
  </div>`;

  const todayCard = `
  <div class="card">
    <div class="card-h"><span class="hi">📅</span><span class="ct">本日の予定</span></div>
    <div style="text-align:center;padding:24px 10px" class="muted"><div style="font-size:13px">予定はありません</div></div>
  </div>`;

  const testsDone = (cand && cand.tests) ? Object.keys(cand.tests).length : 0;
  const todoItems = [
    ['希望条件を入力', !!(cand && cand.pref_location), '/conditions.html?t='+id],
    ['職歴・キャリアを入力', !!(cand && cand.career_job), '/conditions.html?t='+id],
    ['適性診断（6つ）を完了', testsDone>=6, '/tests.html?t='+id],
    ['担当者との面談', !!(cand && ['面談済','紹介可','採用'].includes(cand.status)), null],
  ];
  const todoCard = `
  <div class="card">
    <div class="card-h"><span class="hi">✓</span><span class="ct">次にやること</span></div>
    ${todoItems.map(([t,done,href])=>`
      <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f2f6">
        <span style="color:${done?'var(--good)':'#cfd8e6'}">${done?'✅':'⬜'}</span>
        <div style="flex:1;font-size:14px">${t}</div>
        <span class="${done?'note':'more'}">${done?'完了':(href?`<a href="${href}">進む</a>`:'調整中')}</span></div>`).join('')}
  </div>`;

  document.getElementById('content').innerHTML = `
    ${welcome}
    <div style="height:18px"></div>
    <div class="card" id="aiseeker" style="margin-bottom:18px"></div>
    <div class="grid g-2">
      <div style="display:flex;flex-direction:column;gap:18px">${jobCards}<div class="grid g-2">${statusCard}${todayCard}</div></div>
      <div style="display:flex;flex-direction:column;gap:18px">${aptCard}${todoCard}</div>
    </div>`;
  if (id) { loadSeekerAI(cand).then(loadJobRecs).catch(loadJobRecs); } // AI呼び出しは直列化して同時実行による429を避ける
  if (location.hash) { const t=document.querySelector(location.hash); if(t) setTimeout(()=>t.scrollIntoView({behavior:'smooth',block:'start'}),300); }
}

async function loadJobRecs(force){
  const el=document.getElementById('jobrecs'); if(!el||!id) return;
  const setKpi=(jc,hc)=>{const a=document.getElementById('kpi-jobs'),ad=document.getElementById('kpi-jobs-d'),b=document.getElementById('kpi-high'),bd=document.getElementById('kpi-high-d');if(a)a.innerHTML=jc+'<small>件</small>';if(ad)ad.textContent=jc?'登録求人から':'求人を準備中';if(b)b.innerHTML=hc+'<small>件</small>';if(bd)bd.textContent='相性60%以上';};
  const head='<div class="card-h"><span class="hi">👍</span><span class="ct">あなたにおすすめの求人</span><a class="more" href="#" style="margin-left:auto" onclick="event.preventDefault();loadJobRecs(true)">最新の状態に更新</a></div>';
  const empty=(msg)=>{ el.innerHTML=head+`<div style="text-align:center;padding:30px 14px"><div style="font-size:32px">🗂️</div><p class="note" style="max-width:440px;margin:8px auto 0">${msg}</p></div>`; };
  try{
    // セッション内はキャッシュを使い、毎回のAI呼び出しを避ける（新着求人は「最新の状態に更新」で再取得）
    const ck='wp_jobrecs_'+id;
    let j=null;
    if(!force){ try{ const cached=JSON.parse(sessionStorage.getItem(ck)||'null'); if(cached&&cached.data) j=cached.data; }catch{} }
    if(!j){
      el.innerHTML=head+'<p class="muted">AIがあなたと求人の相性を分析しています…（10〜20秒）</p>';
      const r=await fetch('/api/me/'+id+'/matches',{method:'POST'});
      j=await r.json();
      if(!r.ok||j.matches==null){ setKpi(0,0); empty('ただいま混み合っています。時間をおいて「最新の状態に更新」をお試しください。'); return; }
      try{ sessionStorage.setItem(ck, JSON.stringify({data:j})); }catch{}
    }
    const total=Number.isFinite(Number(j.jobsTotal))?Number(j.jobsTotal):0;
    if(!total){ setKpi(0,0); empty('求人が追加され次第、あなたの適性・価値観・目標をもとにAIが相性の良い求人をご提案します。'); return; }
    if(!j.matches.length){ setKpi(total,0); empty('現在ご紹介できる求人はまだありません。'); return; }
    const num=v=>Number.isFinite(Number(v))?Number(v):'-';
    setKpi(total, j.matches.filter(m=>Number(m.score)>=60).length);
    // マッチ度が高い求人があれば「おすすめ」、無ければ提案ベースの見せ方に切り替える
    const TH=60;
    const sorted=[...j.matches].sort((a,b)=>Number(b.score)-Number(a.score));
    const good=sorted.filter(m=>Number(m.score)>=TH);
    const hasGood=good.length>0;
    const list=hasGood?good:sorted;
    const title=hasGood?'あなたにおすすめの求人':'こんなお仕事もあります';
    const icon=hasGood?'👍':'💡';
    const headFinal='<div class="card-h"><span class="hi">'+icon+'</span><span class="ct">'+title+'</span><a class="more" href="#" style="margin-left:auto" onclick="event.preventDefault();loadJobRecs(true)">最新の状態に更新</a></div>';
    const intro=hasGood?'':'<p class="note" style="margin:2px 0 14px">現在、条件に高く一致する求人はまだありませんが、ご参考までにこのようなお仕事をご紹介します。新しい求人が入り次第、相性の良いものを優先してご案内します。</p>';
    const cards=list.map(m=>{
      const jid=String(m.job_id).replace(/[^0-9]/g,''); const job=j.jobs[jid]||j.jobs[m.job_id]||{}; const sc=num(m.score);
      if(!job.title) return '';
      const tags=(()=>{try{return JSON.parse(job.company_tags||'[]')}catch{return[]}})();
      const gc=(sc>=70?'#22c55e':(sc>=50?'#f5b400':'#94a3b8'));
      // マッチ度が低い（提案）求人では数値を出さず、中立のアイコン表示にする
      const showNum = Number(sc)>=TH;
      const gauge = showNum
        ? `<div class="gauge" style="background:conic-gradient(${gc} ${sc}%, #e8eef5 0);flex:none"><div class="hole"><b>${sc}<small>%</small></b></div></div>`
        : `<div class="gauge" style="background:#eef2f8;flex:none"><div class="hole"><svg viewBox="0 0 24 24" width="22" fill="none" stroke="#94a3b8" stroke-width="1.8"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></div></div>`;
      return `<div class="jobcard" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:14px">
          ${gauge}
          <div style="flex:1">
            <div style="font-weight:800;font-size:15px">${escS(job.title)} <span class="note">${escS(job.company_name)}</span></div>
            <div class="note">${job.salary_min||'-'}〜${job.salary_max||'-'}万円 ／ ${escS(job.location)||'-'} ／ ${escS(job.remote)||'-'}</div>
            <div style="margin-top:4px">${(tags||[]).slice(0,4).map(t=>`<span class="chip">${escS(t)}</span>`).join('')}</div>
          </div>
        </div>
        ${detail(m, showNum)}
      </div>`;
    }).join('');
    el.innerHTML=headFinal+intro+cards;
  }catch(e){ empty('求人の読み込みに失敗しました。'); }
}

// 求人カードの説明部：おすすめ(高マッチ)はAI総評＋理由、提案(低マッチ)は前向きな魅力ポイントのみ
function detail(m, showNum){
  if(showNum){
    return `<div style="margin-top:8px;font-weight:700;color:var(--brand)">${escS(m.verdict||'')}</div>
      <ul style="margin:6px 0 0;padding-left:18px">${(m.reasons||[]).map(x=>`<li>${escS(x)}</li>`).join('')}</ul>`;
  }
  const pts=(m.appeal&&m.appeal.length)?m.appeal.slice(0,3):[];
  return `<div style="margin-top:8px;font-weight:700;color:#0f9d58">✨ あなたにはこんなお仕事もあります</div>
    ${pts.length
      ? `<ul style="margin:6px 0 0;padding-left:18px">${pts.map(x=>`<li>${escS(x)}</li>`).join('')}</ul>`
      : `<p class="note" style="margin:6px 0 0">あなたのご経験や希望をもとにご紹介しています。気になる場合は担当者にお気軽にご相談ください。</p>`}`;
}
const escS = s => (s==null||s==='')?'':String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
const chipsS = arr => (arr||[]).map(x=>`<span class="chip">${escS(x)}</span>`).join(' ')||'<span class="muted">-</span>';
const listS = arr => '<ul style="margin:6px 0 0;padding-left:18px">'+(arr||[]).map(x=>`<li>${escS(x)}</li>`).join('')+'</ul>';
function spectrumS(ax){
  const s=Math.max(2,Math.min(98, ax.score==null?50:ax.score));
  return `<div style="margin:10px 0"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:5px"><span>${escS(ax.left||'')}</span><span>${escS(ax.right||'')}</span></div>
    <div style="position:relative;height:8px;background:linear-gradient(90deg,#c9dbff,#cdefd8);border-radius:6px"><span style="position:absolute;top:-4px;left:calc(${s}% - 8px);width:16px;height:16px;border-radius:50%;background:var(--brand);border:3px solid #fff;box-shadow:0 1px 4px rgba(20,40,80,.25)"></span></div>
    ${ax.note?`<div class="note" style="margin-top:4px">${escS(ax.note)}</div>`:''}</div>`;
}
async function loadSeekerAI(cand){
  const el=document.getElementById('aiseeker'); if(!el) return;
  el.innerHTML=`<div class="card-h"><span class="hi">✨</span><span class="ct">あなたのAIキャリア診断</span></div><p class="muted">診断結果を読み込んでいます…</p>`;
  if(cand && cand.ai_analysis){ renderSeekerAI(cand.ai_analysis); return; }
  // 未生成なら自動で生成（保存されるので次回以降も表示）
  const st=await fetch('/api/ai/status').then(r=>r.json()).catch(()=>({enabled:false}));
  if(!st.enabled){ el.innerHTML=`<div class="card-h"><span class="hi">✨</span><span class="ct">あなたのAIキャリア診断</span></div>
    <p class="muted">AIキャリア診断は現在準備中です。診断・テストのご登録ありがとうございました。準備が整い次第、あなたの強みや向いている仕事・企業タイプをここに表示します。</p>`; return; }
  el.innerHTML=`<div class="card-h"><span class="hi">✨</span><span class="ct">あなたのAIキャリア診断</span></div><p class="muted">AIがあなたの診断結果と目標を分析しています…（10秒ほど）</p>`;
  try{
    const j=await fetch('/api/me/'+id+'/analyze',{method:'POST'}).then(r=>r.json());
    if(j.analysis) renderSeekerAI(j.analysis);
    else el.innerHTML=`<div class="card-h"><span class="hi">✨</span><span class="ct">あなたのAIキャリア診断</span></div><p class="muted">ただいま混み合っています。時間をおいて再度お開きください。</p>`;
  }catch(e){ el.innerHTML=`<div class="card-h"><span class="hi">✨</span><span class="ct">あなたのAIキャリア診断</span></div><p class="muted">読み込みに失敗しました。</p>`; }
}
function renderSeekerAI(a){
  const el=document.getElementById('aiseeker'); const em=a.ever_match||{}, cf=a.company_fit||{}, sa=a.self_analysis||{};
  const hidden=(a.hidden_aptitudes||[]).map(h=>`<div style="padding:8px 0;border-bottom:1px solid #f0f2f6"><b>${escS(h.job)}</b><div class="note">${escS(h.reason)}</div></div>`).join('')||'<span class="muted">-</span>';
  el.innerHTML=`<div class="card-h"><span class="hi">✨</span><span class="ct">あなたのAIキャリア診断</span><span class="tagline" style="margin-left:auto">${escS(a.recommended_type||'')}</span></div>
    <p style="margin:0 0 14px">${escS(a.summary||'')}</p>

    <div class="card" style="box-shadow:none;background:#f4f8ff;border-color:#dbe7ff;margin:0 0 14px">
      <div class="fl">① 応募先（Everエフォート）との相性</div>
      <div style="display:flex;align-items:baseline;gap:12px;margin:4px 0 6px"><div style="font-size:38px;font-weight:800;color:var(--brand);line-height:1">${Number.isFinite(Number(em.score))?Number(em.score):'-'}<small style="font-size:16px">%</small></div><div style="font-weight:700;color:var(--brand)">${escS(em.verdict||'')}</div></div>
      <ul style="margin:0;padding-left:18px">${(em.reasons||[]).map(x=>`<li>${escS(x)}</li>`).join('')}</ul>
    </div>

    <div class="card" style="box-shadow:none;background:#fbf7fa;border-color:#f0dbe6;margin:0 0 14px">
      <div class="fl" style="color:#c44d76">② あなたの自己分析（本当にやりたいこと）</div>
      <p style="margin:6px 0 8px;font-weight:600">${escS(sa.true_motivation||'')}</p>
      <div class="grid2">
        <div><div class="fl">大切にしている価値観</div><div style="margin-top:6px">${chipsS(sa.core_values)}</div></div>
        <div><div class="fl">力を発揮しやすい働き方</div><div style="margin-top:4px">${escS(sa.work_style||'')}</div></div>
      </div>
      ${sa.encouragement?`<p style="margin:10px 0 0;color:#c44d76;font-weight:600">💬 ${escS(sa.encouragement)}</p>`:''}
    </div>

    <div class="card" style="box-shadow:none;background:#f6fdf8;border-color:#bfe6cb;margin:0 0 14px">
      <div class="fl" style="color:var(--good)">③ あなたには、こんな仕事の適性もあります</div>
      <div style="margin:6px 0"><div class="note">向いている職種</div><div style="margin-top:6px">${chipsS(a.fit_jobs)}</div></div>
      <div style="margin-top:10px"><div class="note" style="font-weight:700">意外な適性（気づいていないかも）</div>${hidden}</div>
    </div>

    <div class="grid2" style="align-items:start">
      <div><div class="fl">あなたの強み</div>${listS(a.strengths)}</div>
      <div><div class="fl">向いている業界</div><div style="margin-top:6px">${chipsS(a.fit_industries)}</div></div>
    </div>
    <hr class="hr">
    <div class="card-h" style="margin-bottom:6px"><span class="ct" style="font-size:15px">あなたに向いている企業タイプ</span><span class="tagline" style="margin-left:auto">${escS(cf.summary_label||'')}</span></div>
    <div class="grid2" style="gap:2px 28px">${(cf.axes||[]).map(spectrumS).join('')}</div>
    <div class="grid2" style="margin-top:10px">
      <div><div class="fl" style="color:var(--good)">◎ あなたが輝ける環境</div>${listS(cf.best_environments)}</div>
      <div><div class="fl" style="color:#d97706">△ 気をつけたい環境</div>${listS(cf.avoid_environments)}</div>
    </div>
    <div style="margin-top:10px"><div class="fl">こんな企業がおすすめ</div><div style="margin-top:6px">${chipsS(a.recommended_company_examples)}</div></div>`;
}

renderLayout({ role:'seeker', active:'home', title:'ホーム' });
if (id) {
  fetch('/api/me/'+id).then(r=>r.json()).then(c=>build(c.error?null:c)).catch(()=>build(null));
} else {
  build(null);
}
</script>
</body>
</html>
