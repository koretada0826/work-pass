<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ダッシュボード - WORK PASS</title>
<link rel="stylesheet" href="/ui.css">
</head>
<body>
<div id="app"></div>
<script src="/layout.js"></script>
<script>
const esc = s => (s==null||s==='')?'':String(s).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
const stars = v => { const n=Math.round((v||0)*2)/2; let s=''; for(let i=1;i<=5;i++){ s += i<=Math.floor(n)?'★':(i-0.5===n?'★':'<span class="off">★</span>'); } return s; };
const badge = s => { const m={'登録済':['b-reg','登録済'],'診断済':['b-sel','診断済'],'面談済':['b-ok','面談済'],'採用':['b-ok','採用'],'紹介可':['b-ok','紹介可'],'保留':['b-reg','保留']}; const x=m[s]||['b-reg',s]; return `<span class="badge ${x[0]}">${x[1]}</span>`; };

renderLayout({ role:'admin', active:'dashboard', title:'ダッシュボード' });

Promise.all([
  fetch('/api/stats').then(r=>r.json()),
  fetch('/api/candidates').then(r=>r.json()),
  fetch('/api/jobs').then(r=>r.json()).catch(()=>[])
]).then(([stats, rows, jobs])=>{
  jobs = jobs || [];
  const total = stats.total.toLocaleString();
  const companies = new Set(jobs.map(j=>j.company_name).filter(Boolean)).size;

  // 統計カード（登録求職者数は実データ／他はサンプル）
  const statCards = `
  <div class="grid g-4">
    <div class="card"><div class="stat"><div class="ico"><svg viewBox="0 0 24 24" width="26" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><path d="M17 8a3 3 0 010 6"/></svg></div>
      <div><div class="lab">登録求職者数</div><div class="num">${total}</div><div class="delta">実データ</div></div></div></div>
    <div class="card"><div class="stat"><div class="ico bld"><svg viewBox="0 0 24 24" width="26" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="14" height="18" rx="1"/><path d="M8 7h2M8 11h2M8 15h2"/></svg></div>
      <div><div class="lab">登録企業数</div><div class="num">${companies}</div><div class="delta">求人 ${jobs.length}件</div></div></div></div>
    <div class="card"><div class="stat"><div class="ico cal"><svg viewBox="0 0 24 24" width="26" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg></div>
      <div><div class="lab">本日の面談</div><div class="num">0</div><div class="delta">面談機能は準備中</div></div></div></div>
    <div class="card"><div class="stat"><div class="ico star"><svg viewBox="0 0 24 24" width="26" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l2.7 6.3L21 10l-5 4.3L17.5 21 12 17.5 6.5 21 8 14.3 3 10l6.3-.7z"/></svg></div>
      <div><div class="lab">高一致マッチ</div><div class="num">0</div><div class="delta">求人登録後に算出</div></div></div></div>
  </div>`;

  // AIマッチング（求人があれば案内、無ければ準備中）
  const matchIcon = `<span class="hi"><svg viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M12 3l2.7 6.3L21 10l-5 4.3L17.5 21 12 17.5 6.5 21 8 14.3 3 10l6.3-.7z"/></svg></span>`;
  const match = jobs.length ? `
  <div class="card">
    <div class="card-h">${matchIcon}<span class="ct">AIマッチング</span><a class="more" href="/matching.html" style="margin-left:auto">開く ›</a></div>
    <div style="text-align:center;padding:22px 10px">
      <div style="font-size:16px;font-weight:800">求人が ${jobs.length}件 登録されています</div>
      <div style="margin:10px 0">${jobs.slice(0,4).map(j=>`<span class="chip">${esc(j.title)}（${esc(j.company_name)}）</span>`).join('')}</div>
      <p class="note" style="max-width:600px;margin:0 auto">「AIマッチング」で、各求人に相性の良い求職者を（自由記述まで読み取って）ランキング表示できます。</p>
      <a class="btn btn-primary" href="/matching.html" style="margin-top:14px">AIマッチングを開く</a>
    </div>
  </div>` : `
  <div class="card">
    <div class="card-h">${matchIcon}<span class="ct">AIマッチング</span></div>
    <div style="text-align:center;padding:28px 10px">
      <div style="font-size:16px;font-weight:800">まだ求人が登録されていません</div>
      <p class="note" style="max-width:600px;margin:8px auto 0;font-size:13px">「企業・求人の登録」から求人を追加すると、AIが求職者との相性を分析し、相性の高い組み合わせを提示します。</p>
    </div>
  </div>`;

  // 求職者一覧（実データ）
  const listRows = rows.length ? rows.map(r=>`
    <tr style="cursor:pointer" onclick="location.href='/candidate.html?id=${r.id}'">
      <td><div class="person"><span class="av"></span><span class="nm">${esc(r.name)||'（無名）'}</span></div></td>
      <td>${esc(r.career_job)||'<span class="muted">-</span>'}</td>
      <td>${r.apt_avg!=null?`<span class="stars">${stars(r.apt_avg/20)}</span> <b>${(r.apt_avg/20).toFixed(1)}</b>`:'<span class="muted">未診断</span>'}</td>
      <td>${r.pref_annual_income?r.pref_annual_income+'万円':'<span class="muted">-</span>'}</td>
      <td>${r.tests_done||0}<span class="muted">/6</span></td>
      <td>${badge(r.status)}</td>
    </tr>`).join('') : `<tr><td colspan="6" style="text-align:center;padding:30px" class="muted">まだ登録がありません</td></tr>`;
  const listCard = `
  <div class="card">
    <div class="card-h"><span class="hi"><svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/></svg></span>
      <span class="ct">求職者一覧</span><a class="more" href="/seekers.html">すべて見る ›</a></div>
    <table class="tbl"><thead><tr><th>氏名</th><th>希望職種</th><th>適性</th><th>希望年収</th><th>診断進捗</th><th>ステータス</th></tr></thead>
    <tbody>${listRows}</tbody></table>
  </div>`;

  // 本日の面談予定（面談機能は準備中）
  const ivCard = `
  <div class="card">
    <div class="card-h"><span class="hi"><svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg></span>
      <span class="ct">本日の面談予定</span></div>
    <div style="text-align:center;padding:24px 10px" class="muted"><div style="font-size:13px">予定はありません</div><div class="note" style="margin-top:4px">面談管理機能は準備中です</div></div>
  </div>`;

  // 価値観分布（実データ）
  const d = stats.distribution;
  let acc=0; const segs = d.map(x=>{ const start=acc; acc+=x.percent; return `${x.color} ${start}% ${acc}%`; }).join(',');
  const donutStyle = stats.distributionTotal>0 ? `background:conic-gradient(${segs})` : 'background:#eef2f8';
  const valCard = `
  <div class="card">
    <div class="card-h"><span class="hi"><svg viewBox="0 0 24 24" width="20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
      <span class="ct">価値観分布</span><span class="note">（価値観を登録した求職者）</span></div>
    <div style="display:flex;align-items:center;gap:22px">
      <div class="donut" style="${donutStyle}"><div class="hole"><b>${(stats.distributionTotal||0).toLocaleString()}</b><span>人</span></div></div>
      <div class="legend" style="flex:1">
        ${d.map(x=>`<div class="li"><span class="k" style="background:${x.color}"></span><span>${x.label}</span><span class="v">${x.percent}%</span></div>`).join('')}
      </div>
    </div>
    ${stats.distributionTotal===0?'<div class="note" style="margin-top:10px">※ 価値観を入力した求職者が増えると割合が表示されます</div>':''}
  </div>`;

  document.getElementById('content').innerHTML = `
    ${statCards}
    <div style="height:18px"></div>${match}
    <div style="height:18px"></div>
    <div class="grid g-2">
      <div>${listCard}</div>
      <div style="display:flex;flex-direction:column;gap:18px">${ivCard}${valCard}</div>
    </div>`;
});
</script>
</body>
</html>
