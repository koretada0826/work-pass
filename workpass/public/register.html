<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>プロフィール入力 - WORK PASS</title>
<link rel="stylesheet" href="/ui.css">
</head>
<body>
<div id="wiz"></div>
<div class="obwrap">
  <div style="text-align:center">
    <h1 style="font-size:28px;margin:8px 0">プロフィールを入力しましょう</h1>
    <p class="lead">わかる範囲で大丈夫です。次のステップで適性診断・テストに進みます。</p>
  </div>
  <form id="form">

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><span class="ct">基本情報</span></div>
    <div class="grid2">
      <div class="field"><label class="fl">氏名 <span class="req">必須</span></label><input name="name" required></div>
      <div class="field"><label class="fl">年齢 <span class="req">必須</span></label><input name="age" type="number" min="15" max="99" required></div>
      <div class="field"><label class="fl">最寄駅 <span class="req">必須</span></label><input name="nearest_station" placeholder="例）新宿駅" required></div>
      <div class="field"><label class="fl">通勤可能範囲（分） <span class="req">必須</span></label><input name="commute_range" type="number" min="0" placeholder="例）60" required></div>
    </div>
    <div class="field"><label class="fl">連絡先（電話 / メール / LINE） <span class="req">必須</span></label><input name="contact" required></div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><span class="ct">職歴</span><span class="note" style="margin-left:8px">複数追加できます</span></div>
    <div id="histories"></div>
    <button type="button" class="btn btn-ghost sm" onclick="addHistory()">＋ 職歴を追加</button>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><span class="ct">スキル</span><span class="note" style="margin-left:8px">0＝無し 〜 5＝得意</span></div>
    <div class="grid3" id="skillgrid"></div>
    <div class="field" style="margin-top:8px"><label class="fl">保有資格 <span class="req">必須</span></label><input name="qualifications" placeholder="例）普通自動車免許, 日商簿記2級, TOEIC700（無ければ「なし」）" required></div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><span class="ct">キャリア</span></div>
    <div class="grid2">
      <div class="field"><label class="fl">希望職種 <span class="req">必須</span></label><select name="career_job" required></select></div>
      <div class="field"><label class="fl">希望業界 <span class="req">必須</span></label><select name="career_industry" required></select></div>
    </div>
    <div class="field"><label class="fl">3年後の目標 <span class="req">必須</span></label>
      <textarea name="goal_3y" required placeholder="将来のイメージを自由にお書きください"></textarea></div>
    <div class="field"><label class="fl">5年後の目標 <span class="req">必須</span></label>
      <textarea name="goal_5y" required placeholder="将来のイメージを自由にお書きください"></textarea></div>
    <div class="field"><label class="fl">将来やりたい仕事 <span class="req">必須</span></label>
      <textarea name="future_work" required placeholder="やってみたい仕事や理由を自由にお書きください"></textarea></div>
  </div>

  <div style="display:flex;gap:12px;justify-content:flex-end">
    <a class="btn btn-ghost" href="/">やめる</a>
    <button type="submit" class="btn btn-primary">適性診断・テストへ進む →</button>
  </div>
  </form>
</div>
<div class="toast" id="toast"></div>
<script src="/layout.js"></script>
<script>
document.getElementById('wiz').innerHTML = wizHeader(1);
const opt05 = '<option value="" selected disabled>選択</option>'+Array.from({length:6},(_,i)=>`<option value="${i}">${i}</option>`).join('');
const skills=[['skill_sales','営業'],['skill_hospitality','接客'],['skill_admin','事務'],['skill_pc','PCスキル'],['skill_ai','AIツール']];
document.getElementById('skillgrid').innerHTML = skills.map(([n,l])=>`<div class="field"><label class="fl">${l} <span class="req">必須</span></label><select name="${n}" required>${opt05}</select></div>`).join('');

// 業界・職種の選択肢（細かめ）
const INDUSTRIES=['IT・ソフトウェア','SaaS・Web','通信','電機・機械メーカー','食品・消費財メーカー','自動車','化学・素材','医薬・医療機器','建設・不動産','銀行・証券','保険','商社','小売・流通','EC・通販','飲食','旅行・宿泊','運輸・物流','人材・派遣','広告・マーケティング','コンサルティング','教育','医療・介護・福祉','士業・専門サービス','エネルギー・インフラ','農林水産','公務・団体','特にこだわらない','その他'];
const JOBTYPES=['営業（新規開拓）','営業（既存・ルート）','インサイドセールス','フィールドセールス','カスタマーサクセス','販売・接客','カスタマーサポート／コールセンター','マーケティング','広報・PR','事業企画・経営企画','商品・サービス企画','一般事務','営業事務','経理・財務','人事・労務','総務','法務','購買・調達','生産・品質管理','ITエンジニア（開発）','インフラ・ネットワーク','データ分析','デザイナー・クリエイティブ','Webディレクター','コンサルタント','研究・開発','医療・看護・介護','教育・講師','物流・倉庫','製造・技術（現場）','建築・土木','特にこだわらない','その他'];
const optList=arr=>'<option value="" disabled selected>選択してください</option>'+arr.map(v=>`<option value="${v}">${v}</option>`).join('');
document.querySelector('[name=career_job]').innerHTML=optList(JOBTYPES);
document.querySelector('[name=career_industry]').innerHTML=optList(INDUSTRIES);

function addHistory(){
  const div=document.createElement('div');
  div.className='card'; div.style.cssText='background:#f7f9fd;margin-bottom:12px'; div.dataset.h='1';
  div.innerHTML=`<div class="grid2">
      <div class="field"><label class="fl">業界 <span class="req">必須</span></label><select data-f="industry" required>${optList(INDUSTRIES)}</select></div>
      <div class="field"><label class="fl">職種 <span class="req">必須</span></label><select data-f="job_type" required>${optList(JOBTYPES)}</select></div>
      <div class="field"><label class="fl">勤務年数 <span class="req">必須</span></label><input data-f="years" type="number" step="0.5" min="0" required></div>
      <div class="field"><label class="fl">退職理由 <span class="req">必須</span></label><input data-f="resignation_reason" required></div>
    </div>
    <div class="field"><label class="fl">実績（数値で書けると◎） <span class="req">必須</span></label><textarea data-f="achievement" placeholder="例）新規開拓 月10件 / 売上前年比120%" required></textarea></div>
    <button type="button" class="btn btn-ghost sm" onclick="this.parentNode.remove()">この職歴を削除</button>`;
  document.getElementById('histories').appendChild(div);
}
addHistory();

document.getElementById('form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn=e.target.querySelector('button[type=submit]'); if(btn.disabled) return; btn.disabled=true; // 二重送信防止
  const fd=new FormData(e.target); const data={};
  for(const [k,v] of fd.entries()) data[k]= v===''? null : v;
  ['age','commute_range','skill_sales','skill_hospitality','skill_admin','skill_pc','skill_ai'].forEach(k=>{ if(data[k]!=null) data[k]=Number(data[k]); });
  data.work_histories=[...document.querySelectorAll('[data-h]')].map(h=>{
    const o={}; h.querySelectorAll('[data-f]').forEach(el=>o[el.dataset.f]= el.value||null);
    if(o.years!=null) o.years=Number(o.years); return o;
  }).filter(o=>o.industry||o.job_type);
  let j;
  try{ const r=await fetch('/api/candidates',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); j=await r.json(); if(!r.ok) throw new Error(j.error||'save failed'); }
  catch(err){ btn.disabled=false; const t=document.getElementById('toast'); t.textContent='保存に失敗しました。時間をおいて再度お試しください。'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); return; }
  if(!j||!j.id){ btn.disabled=false; const t=document.getElementById('toast'); t.textContent='保存に失敗しました（IDが取得できませんでした）'; t.classList.add('show'); return; }
  const t=document.getElementById('toast'); t.textContent='保存しました。適性診断・テストへ進みます…'; t.classList.add('show');
  setTimeout(()=>location.href='/tests.html?id='+j.id, 800);
});
</script>
</body>
</html>
