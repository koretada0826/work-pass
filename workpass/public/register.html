<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>プロフィール入力 - WORK PASS</title>
<link rel="stylesheet" href="/ui.css">
</head>
<body>
<div id="wiz"></div>
<div class="obwrap">
  <div style="text-align:center">
    <h1 style="font-size:28px;margin:8px 0">プロフィールを入力しましょう</h1>
    <p class="lead">わかる範囲で大丈夫です。次のステップで適性診断・テストに進みます。</p>
  </div>
  <form id="form">

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><span class="ct">基本情報</span></div>
    <div class="grid2">
      <div class="field"><label class="fl">氏名 <span class="req">必須</span></label><input name="name" required></div>
      <div class="field"><label class="fl">年齢 <span class="req">必須</span></label><input name="age" type="number" min="15" max="99" required></div>
      <div class="field"><label class="fl">最寄駅 <span class="req">必須</span></label><input name="nearest_station" id="stationInput" placeholder="例）新宿" autocomplete="off" required></div>
      <div class="field"><label class="fl">通勤可能範囲 <span class="req">必須</span></label>
        <select name="commute_range" required><option value="" disabled selected>選択してください</option><option value="15">15分以内</option><option value="30">30分以内</option><option value="45">45分以内</option><option value="60">1時間以内</option><option value="90">1時間半以内</option><option value="120">2時間以内</option><option value="180">2時間以上</option></select></div>
    </div>
    <div class="grid2">
      <div class="field"><label class="fl">電話番号 <span class="req">必須</span></label><input name="phone" type="tel" inputmode="tel" autocomplete="tel" placeholder="例）090-1234-5678" required></div>
      <div class="field"><label class="fl">メールアドレス <span class="req">必須</span></label><input name="email" type="email" inputmode="email" autocomplete="email" placeholder="例）name@example.com" required></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><span class="ct">職歴</span><span class="note" style="margin-left:8px">複数追加できます（未経験・職歴なしの方は入力不要です）</span></div>
    <div id="histories"></div>
    <button type="button" class="btn btn-ghost sm" onclick="addHistory()">＋ 職歴を追加</button>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><span class="ct">スキル</span><span class="note" style="margin-left:8px">0＝無し 〜 5＝得意</span></div>
    <div class="grid3" id="skillgrid"></div>
    <div class="field" style="margin-top:8px"><label class="fl">保有資格 <span class="req">必須</span></label><input name="qualifications" placeholder="例）普通自動車免許, 日商簿記2級, TOEIC700（無ければ「なし」）" required></div>
    <div class="field" style="margin-top:8px"><label class="fl">MBTI（16タイプ性格診断） <span class="note" style="font-weight:400">任意・分かる方のみ</span></label>
      <select name="mbti">
        <option value="">選択しない／わからない</option>
      </select>
      <div class="note" style="margin-top:4px">ご存じない方は空欄でOKです。<a href="https://www.16personalities.com/ja" target="_blank" rel="noreferrer noopener">無料の16タイプ診断はこちら</a></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-h"><span class="ct">キャリア</span></div>
    <div class="field"><label class="fl">希望職種 <span class="req">必須</span> <span class="note" style="font-weight:400">（複数選択できます）</span></label><div class="days" id="cj_chips"></div></div>
    <div class="field"><label class="fl">希望業界 <span class="req">必須</span> <span class="note" style="font-weight:400">（複数選択できます）</span></label><div class="days" id="ci_chips"></div></div>
    <div class="field"><label class="fl">稼ぎたい年収（万円） <span class="req">必須</span></label>
      <input name="target_income" type="number" min="0" max="5000" step="100" placeholder="例）500" required></div>
    <div class="field"><label class="fl">3年後の目標 <span class="req">必須</span></label>
      <textarea name="goal_3y" required placeholder="将来のイメージを自由にお書きください"></textarea></div>
    <div class="field"><label class="fl">将来やりたい仕事 <span class="req">必須</span></label>
      <textarea name="future_work" required placeholder="やってみたい仕事や理由を自由にお書きください"></textarea></div>
  </div>

  <div style="display:flex;gap:12px;justify-content:flex-end">
    <a class="btn btn-ghost" href="/">やめる</a>
    <button type="submit" class="btn btn-primary">適性診断・テストへ進む →</button>
  </div>
  </form>
</div>
<div class="toast" id="toast"></div>
<script src="/layout.js"></script>
<script>
document.getElementById('wiz').innerHTML = wizHeader(1);
const opt05 = '<option value="" selected disabled>選択</option>'+['0（なし）','1','2','3','4','5（得意）'].map((l,i)=>`<option value="${i}">${l}</option>`).join('');
const skills=[['skill_sales','営業'],['skill_hospitality','コミュニケーション能力'],['skill_admin','事務'],['skill_pc','PCスキル'],['skill_ai','AIツール']];
document.getElementById('skillgrid').innerHTML = skills.map(([n,l])=>`<div class="field"><label class="fl">${l} <span class="req">必須</span></label><select name="${n}" required>${opt05}</select></div>`).join('');

// MBTI 16タイプ（任意）
const MBTI=[['INTJ','建築家'],['INTP','論理学者'],['ENTJ','指揮官'],['ENTP','討論者'],['INFJ','提唱者'],['INFP','仲介者'],['ENFJ','主人公'],['ENFP','運動家'],['ISTJ','管理者'],['ISFJ','擁護者'],['ESTJ','幹部'],['ESFJ','領事'],['ISTP','巨匠'],['ISFP','冒険家'],['ESTP','起業家'],['ESFP','エンターテイナー']];
document.querySelector('select[name="mbti"]').insertAdjacentHTML('beforeend', MBTI.map(([v,l])=>`<option value="${v}">${v}（${l}）</option>`).join(''));

// 業界・職種の選択肢（人気の高い順に並べ、「特にこだわらない」「その他」は末尾）
const INDUSTRIES=['IT・ソフトウェア','SaaS・Web','広告・マーケティング','人材・派遣','商社','コンサルティング','小売・流通','EC・通販','医療・介護・福祉','銀行・証券','保険','建設・不動産','食品・消費財メーカー','通信','教育','旅行・宿泊','飲食','運輸・物流','自動車','電機・機械メーカー','化学・素材','医薬・医療機器','士業・専門サービス','エネルギー・インフラ','農林水産','公務・団体','その他','特にこだわらない'];
const JOBTYPES=['営業（新規開拓）','営業（既存・ルート）','インサイドセールス','フィールドセールス','カスタマーサクセス','販売・接客','カスタマーサポート／コールセンター','マーケティング','広報・PR','事業企画・経営企画','商品・サービス企画','一般事務','営業事務','経理・財務','人事・労務','総務','法務','購買・調達','生産・品質管理','ITエンジニア（開発）','インフラ・ネットワーク','データ分析','デザイナー・クリエイティブ','Webディレクター','コンサルタント','研究・開発','医療・看護・介護','教育・講師','物流・倉庫','製造・技術（現場）','建築・土木','その他','特にこだわらない'];
const optList=arr=>'<option value="" disabled selected>選択してください</option>'+arr.map(v=>`<option value="${v}">${v}</option>`).join('');
// 職歴用は「特にこだわらない」を除外（実際に働いた業界・職種を選ぶため）
const HIST_INDUSTRIES=INDUSTRIES.filter(v=>v!=='特にこだわらない');
const HIST_JOBTYPES=JOBTYPES.filter(v=>v!=='特にこだわらない');
// 勤続年数はプルダウン（値は数値・表示はラベル）
const YEARS=[['0.5','1年未満'],['1','1年'],['2','2年'],['3','3年'],['4','4年'],['5','5年'],['6','6年'],['7','7年'],['8','8年'],['9','9年'],['10','10年'],['15','10年以上']];
const optYears='<option value="" disabled selected>選択してください</option>'+YEARS.map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
// 退職理由もプルダウン（「その他」を含む）
const RESIGN=['キャリアアップ・スキルアップのため','給与・待遇に不満があった','人間関係の悩み','労働環境・長時間労働','会社の将来性への不安','業務内容が合わなかった','家庭の事情（結婚・出産・育児・介護など）','引っ越し・転居','契約期間の満了','会社都合（倒産・リストラ等）','在職中（現職）','その他'];
const optResign='<option value="" disabled selected>選択してください</option>'+RESIGN.map(v=>`<option value="${v}">${v}</option>`).join('');
// 最寄駅の予測変換（主要駅。一覧に無くても自由入力できます）
// 最寄駅の予測変換（読み仮名で検索：「しん」→新宿・新橋…／漢字入力もOK／一覧に無くても自由入力可）
const STATIONS=[['新宿','しんじゅく'],['渋谷','しぶや'],['池袋','いけぶくろ'],['東京','とうきょう'],['品川','しながわ'],['新橋','しんばし'],['秋葉原','あきはばら'],['上野','うえの'],['有楽町','ゆうらくちょう'],['浜松町','はままつちょう'],['田町','たまち'],['恵比寿','えびす'],['目黒','めぐろ'],['五反田','ごたんだ'],['大崎','おおさき'],['高田馬場','たかだのばば'],['中野','なかの'],['荻窪','おぎくぼ'],['吉祥寺','きちじょうじ'],['三鷹','みたか'],['立川','たちかわ'],['町田','まちだ'],['八王子','はちおうじ'],['北千住','きたせんじゅ'],['錦糸町','きんしちょう'],['押上','おしあげ'],['大手町','おおてまち'],['日本橋','にほんばし'],['銀座','ぎんざ'],['六本木','ろっぽんぎ'],['赤坂','あかさか'],['表参道','おもてさんどう'],['外苑前','がいえんまえ'],['四ツ谷','よつや'],['市ヶ谷','いちがや'],['飯田橋','いいだばし'],['後楽園','こうらくえん'],['水道橋','すいどうばし'],['神保町','じんぼうちょう'],['御茶ノ水','おちゃのみず'],['大井町','おおいまち'],['蒲田','かまた'],['自由が丘','じゆうがおか'],['二子玉川','ふたこたまがわ'],['武蔵小杉','むさしこすぎ'],['溝の口','みぞのくち'],['あざみ野','あざみの'],['たまプラーザ','たまぷらーざ'],['横浜','よこはま'],['川崎','かわさき'],['桜木町','さくらぎちょう'],['関内','かんない'],['みなとみらい','みなとみらい'],['戸塚','とつか'],['藤沢','ふじさわ'],['大宮','おおみや'],['浦和','うらわ'],['川口','かわぐち'],['所沢','ところざわ'],['船橋','ふなばし'],['西船橋','にしふなばし'],['千葉','ちば'],['海浜幕張','かいひんまくはり'],['柏','かしわ'],['松戸','まつど'],['大阪','おおさか'],['梅田','うめだ'],['難波','なんば'],['天王寺','てんのうじ'],['新大阪','しんおおさか'],['京橋','きょうばし'],['本町','ほんまち'],['淀屋橋','よどやばし'],['心斎橋','しんさいばし'],['三宮','さんのみや'],['神戸','こうべ'],['京都','きょうと'],['四条','しじょう'],['烏丸','からすま'],['名古屋','なごや'],['栄','さかえ'],['金山','かなやま'],['博多','はかた'],['天神','てんじん'],['札幌','さっぽろ'],['仙台','せんだい'],['広島','ひろしま'],['岡山','おかやま'],['熊本','くまもと'],['鹿児島中央','かごしまちゅうおう'],['那覇','なは']];
function toHira(s){ return String(s||'').replace(/[ァ-ン]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60)).toLowerCase(); }
(function attachStationAC(){
  const input=document.getElementById('stationInput'); if(!input) return;
  const wrap=document.createElement('div'); wrap.style.position='relative';
  input.parentNode.insertBefore(wrap, input); wrap.appendChild(input);
  const menu=document.createElement('div');
  menu.style.cssText='position:absolute;left:0;right:0;top:100%;margin-top:4px;z-index:60;background:#fff;border:1px solid #dfe6f0;border-radius:10px;box-shadow:0 10px 28px rgba(20,40,80,.14);max-height:260px;overflow:auto;display:none';
  wrap.appendChild(menu);
  let items=[], active=-1;
  const close=()=>{ menu.style.display='none'; active=-1; };
  const pick=s=>{ input.value=s[0]+'駅'; close(); };
  const hi=()=>menu.querySelectorAll('.ac-item').forEach((el,i)=>el.style.background=i===active?'#eef3ff':'');
  function filter(){
    const raw=input.value.replace(/駅$/,'').trim(); const q=toHira(raw);
    if(!q){ close(); return; }
    const starts=[], incl=[];
    STATIONS.forEach(s=>{ const y=toHira(s[1]); if(y.startsWith(q)||s[0].startsWith(raw)) starts.push(s); else if(y.includes(q)||s[0].includes(raw)) incl.push(s); });
    items=[...starts,...incl].slice(0,10);
    if(!items.length){ close(); return; }
    menu.innerHTML=items.map((s,i)=>`<div class="ac-item" data-i="${i}" style="padding:10px 12px;cursor:pointer;font-size:14px;border-bottom:1px solid #f2f5fa">${s[0]}駅</div>`).join('');
    menu.style.display='block'; active=-1;
    menu.querySelectorAll('.ac-item').forEach(el=>{
      el.addEventListener('mousedown',e=>{ e.preventDefault(); pick(items[+el.dataset.i]); });
      el.addEventListener('mouseenter',()=>{ active=+el.dataset.i; hi(); });
    });
  }
  input.addEventListener('input',filter);
  input.addEventListener('focus',()=>{ if(input.value) filter(); });
  input.addEventListener('keydown',e=>{
    if(e.isComposing||e.keyCode===229) return; // IME変換中は無視
    if(menu.style.display==='none') return;
    if(e.key==='ArrowDown'){ e.preventDefault(); active=Math.min(items.length-1,active+1); hi(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); active=Math.max(0,active-1); hi(); }
    else if(e.key==='Enter'&&active>=0){ e.preventDefault(); pick(items[active]); }
    else if(e.key==='Escape'){ close(); }
  });
  document.addEventListener('click',e=>{ if(!wrap.contains(e.target)) close(); });
})();
// 希望職種・希望業界＝複数選択ドロップダウン（開いてチェック→選択はタグ表示）
function makeMultiSelect(mountId, options, placeholder){
  const wrap=document.getElementById(mountId); wrap.className='msel';
  wrap.innerHTML=`<div class="msel-box"><span class="msel-ph">${placeholder}</span></div><div class="msel-panel">${options.map(v=>`<label><input type="checkbox" value="${v}"> ${v}</label>`).join('')}</div>`;
  const box=wrap.querySelector('.msel-box'), panel=wrap.querySelector('.msel-panel');
  const render=()=>{
    const sel=[...panel.querySelectorAll('input:checked')].map(i=>i.value);
    box.innerHTML = sel.length ? sel.map(v=>`<span class="msel-tag">${v}<b data-v="${v}">×</b></span>`).join('') : `<span class="msel-ph">${placeholder}</span>`;
    box.querySelectorAll('.msel-tag b').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();const inp=panel.querySelector(`input[value="${b.dataset.v}"]`);if(inp){inp.checked=false;render();}}));
  };
  box.addEventListener('click',()=>{panel.classList.toggle('open');box.classList.toggle('open');});
  panel.querySelectorAll('input').forEach(i=>i.addEventListener('change',render));
  document.addEventListener('click',e=>{if(!wrap.contains(e.target)){panel.classList.remove('open');box.classList.remove('open');}});
  wrap._get=()=>[...panel.querySelectorAll('input:checked')].map(i=>i.value);
  return wrap;
}
const msJob=makeMultiSelect('cj_chips',JOBTYPES,'選択してください（複数可）');
const msInd=makeMultiSelect('ci_chips',INDUSTRIES,'選択してください（複数可）');

function addHistory(){
  const div=document.createElement('div');
  div.className='card'; div.style.cssText='background:#f7f9fd;margin-bottom:12px'; div.dataset.h='1';
  div.innerHTML=`<div class="grid2">
      <div class="field"><label class="fl">業界 <span class="req">必須</span></label><select data-f="industry" required>${optList(HIST_INDUSTRIES)}</select></div>
      <div class="field"><label class="fl">職種 <span class="req">必須</span></label><select data-f="job_type" required>${optList(HIST_JOBTYPES)}</select></div>
      <div class="field"><label class="fl">勤続年数 <span class="req">必須</span></label><select data-f="years" required>${optYears}</select></div>
      <div class="field"><label class="fl">退職理由 <span class="req">必須</span></label><select data-f="resignation_reason" required>${optResign}</select></div>
    </div>
    <div class="field"><label class="fl">実績（数値で書けると◎） <span class="req">必須</span></label><textarea data-f="achievement" placeholder="例）新規開拓 月10件 / 売上前年比120%" required></textarea></div>
    <button type="button" class="btn btn-ghost sm" onclick="this.parentNode.remove()">この職歴を削除</button>`;
  document.getElementById('histories').appendChild(div);
}
// 初期表示では職歴カードを出さない（未経験者が「＋職歴を追加」を押さなくても登録できるように）

document.getElementById('form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn=e.target.querySelector('button[type=submit]'); if(btn.disabled) return; btn.disabled=true; // 二重送信防止
  const fd=new FormData(e.target); const data={};
  for(const [k,v] of fd.entries()) data[k]= v===''? null : v;
  ['age','commute_range','skill_sales','skill_hospitality','skill_admin','skill_pc','skill_ai','target_income'].forEach(k=>{ if(data[k]!=null) data[k]=Number(data[k]); });
  data.work_histories=[...document.querySelectorAll('[data-h]')].map(h=>{
    const o={}; h.querySelectorAll('[data-f]').forEach(el=>o[el.dataset.f]= el.value||null);
    if(o.years!=null) o.years=Number(o.years); return o;
  }).filter(o=>o.industry||o.job_type);
  // 希望職種・希望業界（複数選択チップ）
  data.career_job = msJob._get().join('／') || null;
  data.career_industry = msInd._get().join('／') || null;
  if(!data.career_job || !data.career_industry){ btn.disabled=false; const t=document.getElementById('toast'); t.textContent='希望職種・希望業界をそれぞれ1つ以上選んでください'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); return; }
  let j;
  try{ const r=await fetch('/api/candidates',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); j=await r.json(); if(!r.ok) throw new Error(j.error||'save failed'); }
  catch(err){ btn.disabled=false; const t=document.getElementById('toast'); t.textContent='保存に失敗しました。時間をおいて再度お試しください。'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); return; }
  if(!j||!j.token){ btn.disabled=false; const t=document.getElementById('toast'); t.textContent='保存に失敗しました（登録情報が取得できませんでした）'; t.classList.add('show'); return; }
  const t=document.getElementById('toast'); t.textContent='保存しました。適性診断・テストへ進みます…'; t.classList.add('show');
  setTimeout(()=>location.href='/tests.html?t='+encodeURIComponent(j.token), 800);
});
</script>
</body>
</html>
